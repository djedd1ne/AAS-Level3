services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    networks:
      - basyx-net
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: keycloak-db
    networks:
      - basyx-net
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  aas-environment:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: basyx-aas-environment
    networks:
      - basyx-net
    environment:
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      BASYX_SERVICE_SECRET: ${BASYX_SERVICE_SECRET}
      HOST_IP: ${HOST_IP}
    volumes:
      - ./aas:/application/aas
      - ./basyx/aas-env.properties:/application/application.properties
      - ./basyx/rbac_rules.json:/application/rbac_rules.json
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped

  aas-web-ui:
    image: eclipsebasyx/aas-gui:latest
    container_name: basyx-aas-web-ui
    networks:
      - basyx-net
    environment:
      AAS_REPO_PATH: "https://${HOST_IP}:8081/shells"
      SUBMODEL_REPO_PATH: "https://${HOST_IP}:8081/submodels"
      CD_REPO_PATH: "https://${HOST_IP}:8081/concept-descriptions"
      KEYCLOAK_ACTIVE: "true"
      KEYCLOAK_URL: "https://${HOST_IP}:9096"
      KEYCLOAK_REALM: "basyx"
      KEYCLOAK_CLIENT_ID: "basyx-web-ui"
    depends_on:
      - aas-environment
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    networks:
      - basyx-net
    environment:
      KEYCLOAK_ADMIN: ${KC_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_PASSWORD}
      # DB connection
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # Hostname settings / proxy
      KC_HOSTNAME_URL: "https://${HOST_IP}:9096"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HTTP_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - keycloak-data:/opt/keycloak/data
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: basyx-proxy
    networks:
      - basyx-net
    ports:
      - "3000:3000"
      - "8081:8081"
      - "9096:9096"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - aas-web-ui
      - aas-environment
      - keycloak
    restart: unless-stopped

volumes:
  mongo-data:
  keycloak-data:
  postgres-data:

networks:
  basyx-net:
    driver: bridge